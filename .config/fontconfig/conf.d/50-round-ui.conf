<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Kosugi Maru -->
  <match target="font">
    <test name="family" compare="eq">
      <string>Kosugi Maru</string>
    </test>

    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>

    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>

    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <!-- Mochiy Pop One -->
  <match target="font">
    <test name="family" compare="eq">
      <string>Mochiy Pop One</string>
    </test>

    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>

    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>

    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

</fontconfig>

